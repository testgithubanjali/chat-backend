version: "3.8"

services:
  backend:
    build: ./chat-backend
    ports:
      - "8080:8080"
    depends_on:
      - mongo

  frontend:
    build: ./chat-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: